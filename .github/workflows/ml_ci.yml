name: ML CI Pipeline
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # This removes the warning

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: pytest -s
